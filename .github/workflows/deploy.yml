name: Deploy CI/CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build_ecr:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::448049815254:role/GithubActionsRepoWebsite
          aws-region: us-east-2

      - name: Login to Amazon ECR for Github Action
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Inject build datetime and production asset URLs into HTML
        run: |
          BUILD_DATETIME=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y às %H:%M")
          sed -i "s|{{BUILD_DATETIME}}|$BUILD_DATETIME|g" website/index.html
          sed -i 's|href="css/|href="https://www.fabiovigedev.com.br/css/|g' website/index.html
          sed -i 's|src="js/|src="https://www.fabiovigedev.com.br/js/|g' website/index.html

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: 448049815254.dkr.ecr.us-east-2.amazonaws.com
          ECR_REPOSITORY: website-prod
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy_ec2:
    name: deploy_ec2
    needs: build_ecr
    runs-on: ubuntu-latest
    env:
      IP_PUBLIC: ${{ secrets.IP_PUBLIC }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      IMAGE: 448049815254.dkr.ecr.us-east-2.amazonaws.com/website-prod:${{ github.sha }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::448049815254:role/GithubActionsRepoWebsite
          aws-region: us-east-2

      - name: Allow runner IP on security group
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=website-sg" --query 'SecurityGroups[0].GroupId' --output text --region us-east-2)
          echo "SG_ID=$SG_ID" >> $GITHUB_ENV
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 22 --cidr ${RUNNER_IP}/32 --region us-east-2

      - name: Deploy EC2 SSH
        run: |
          echo "$SSH_PRIVATE_KEY" > chave-site-prod.pem
          chmod 400 chave-site-prod.pem
          ssh -o StrictHostKeyChecking=no -i chave-site-prod.pem ec2-user@$IP_PUBLIC << EOF
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 448049815254.dkr.ecr.us-east-2.amazonaws.com
            docker pull $IMAGE
            docker stop website-prod || true
            docker rm website-prod || true
            docker run -d --name website-prod -p 80:80 --restart always $IMAGE
            docker ps -a
          EOF
          rm -f chave-site-prod.pem

      - name: Revoke runner IP from security group
        if: always()
        run: |
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=website-sg" --query 'SecurityGroups[0].GroupId' --output text --region us-east-2)
          aws ec2 revoke-security-group-ingress --group-id $SG_ID --protocol tcp --port 22 --cidr ${RUNNER_IP}/32 --region us-east-2
