name: Deploy CI/CD

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::448049815254:role/GithubActionsRepoWebsite
          aws-region: us-east-2

      - name: Login to Amazon ECR for Github Action
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: 448049815254.dkr.ecr.us-east-2.amazonaws.com
          ECR_REPOSITORY: website-prod
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  job2:
    name: deploy_ec2
    needs: job1
    env:
      IP_PUBLIC: ${{ secrets.IP_PUBLIC }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
      IMAGE: 448049815254.dkr.ecr.us-east-2.amazonaws.com/website-prod:${{ github.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: "Deploy EC2 SSH"
        run: |
          echo "$SSH_PRIVATE_KEY" > chave-site-prod.pem
          chmod 400 chave-site-prod.pem
          ssh -o StrictHostKeyChecking=no -i chave-site-prod.pem ec2-user@$IP_PUBLIC << EOF
            aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 448049815254.dkr.ecr.us-east-2.amazonaws.com
            docker pull $IMAGE
            docker stop website-prod || true
            docker rm website-prod || true
            docker run -d --name website-prod -p 80:80 --restart always $IMAGE
            docker ps -a
          EOF
          rm -f chave-site-prod.pem